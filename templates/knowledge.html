{% extends "base.html" %}
{% block content %}
<div style="max-width:800px; margin:0 auto;">
    <h2 style="margin-bottom:20px;">📚 健康科普</h2>
    {% if articles %}
        {% for a in articles %}
        <div class="card">
            <div class="card-title">{{ a.title }} <span class="badge badge-primary" style="margin-left:10px;">{{ a.category }}</span></div>
            <p style="line-height:1.8;">{{ a.content }}</p>
            <p style="color:var(--primary); font-weight:600; margin-top:10px;">💡 {{ a.encouragement }}</p>
            <p style="color:var(--text-muted); font-size:0.8em; margin-top:8px;">📅 {{ a.publish_date }}</p>
        </div>
        {% endfor %}
    {% else %}
        <div class="card"><p style="text-align:center; padding:40px; color:var(--text-muted);">暂无科普文章</p></div>
    {% endif %}
</div>
{% endblock %}
