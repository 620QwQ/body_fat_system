{% extends "base.html" %}
{% block content %}
<div style="max-width:420px; margin:40px auto;">
    <div class="card" style="padding:36px;">
        <h2 style="text-align:center; color:var(--primary);">🔑 找回密码</h2>
        {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
        <form method="post">
            <div class="form-group"><label>📱 手机号</label><input type="text" name="phone" required></div>
            <div class="form-group"><label>📛 真实姓名</label><input type="text" name="real_name" required></div>
            <div class="form-group"><label>新密码（英文+数字）</label><input type="password" name="new_password" required></div>
            <button type="submit" class="btn btn-primary btn-block">重置密码</button>
        </form>
        <p style="text-align:center; margin-top:20px;"><a href="/login" style="color:var(--primary);">返回登录</a></p>
    </div>
</div>
{% endblock %}
