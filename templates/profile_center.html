{% extends "base.html" %}
{% block content %}
<div style="max-width:700px; margin:20px auto;">
    {% if success %}<div class="alert alert-success">✅ {{ success }}</div>{% endif %}
    {% if error %}<div class="alert alert-error">⚠️ {{ error }}</div>{% endif %}

    <div class="card" style="padding:30px;">
        <div class="card-title" style="font-size:1.2em; margin-bottom:20px;"><span class="icon">👤</span> 个人信息</div>
        <form method="post">
            <input type="hidden" name="action" value="update_info">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px;">
                <div class="form-group"><label>昵称</label><input type="text" name="nickname" value="{{ user.nickname if user else '' }}" required></div>
                <div class="form-group"><label>手机号</label><input type="tel" name="phone" value="{{ user.phone if user else '' }}" required></div>
                <div class="form-group"><label>真实姓名</label><input type="text" value="{{ user.real_name if user else '' }}" disabled><div class="form-hint">实名信息不可修改</div></div>
                <div class="form-group"><label>性别</label><select name="gender"><option value="男" {% if user and user.gender=='男' %}selected{% endif %}>男</option><option value="女" {% if user and user.gender=='女' %}selected{% endif %}>女</option></select></div>
                <div class="form-group"><label>出生日期</label><input type="date" name="birth_date" value="{{ user.birth_date if user else '' }}"></div>
                <div class="form-group"><label>年龄</label><input type="text" value="{{ user.age if user else '-' }} 岁" disabled></div>
                <div class="form-group"><label>身高 (cm)</label><input type="number" step="0.1" name="height_cm" value="{{ user.height_cm if user else '' }}"></div>
                <div class="form-group"><label>当前体重 (kg)</label><input type="number" step="0.1" name="weight_kg" value="{{ user.weight_kg if user else '' }}"></div>
            </div>
            <button type="submit" class="btn btn-primary" style="margin-top:20px;">💾 保存修改</button>
        </form>
    </div>

    <div class="card" style="padding:30px; margin-top:20px;">
        <div class="card-title" style="font-size:1.2em; margin-bottom:20px;"><span class="icon">🔒</span> 修改密码</div>
        <form method="post" onsubmit="return validatePasswordForm()">
            <input type="hidden" name="action" value="change_password">
            <div class="form-group"><label>原密码</label><input type="password" name="old_password" required></div>
            <div class="form-group"><label>新密码</label><input type="password" name="new_password" id="newPwd" required placeholder="英文+数字，6位以上"></div>
            <div class="form-group"><label>确认新密码</label><input type="password" name="new_password2" id="newPwd2" required><div class="form-hint" id="pwdHint"></div></div>
            <button type="submit" class="btn btn-primary">🔒 修改密码</button>
        </form>
    </div>
    <div style="text-align:center; margin-top:20px;"><a href="/dashboard" class="btn btn-outline">← 返回仪表盘</a></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function validatePasswordForm() {
    var newPwd = document.getElementById('newPwd').value;
    var newPwd2 = document.getElementById('newPwd2').value;
    if (!(/[a-zA-Z]/.test(newPwd) && /[0-9]/.test(newPwd))) { alert('新密码必须包含英文和数字！'); return false; }
    if (newPwd.length < 6) { alert('新密码至少6位！'); return false; }
    if (newPwd !== newPwd2) { alert('两次新密码不一致！'); return false; }
    return true;
}
document.getElementById('newPwd2').addEventListener('input', function() {
    var pwd = document.getElementById('newPwd').value;
    var hint = document.getElementById('pwdHint');
    if (this.value.length === 0) hint.textContent = '';
    else if (pwd === this.value) hint.innerHTML = '<span style="color:var(--success);">✅ 密码一致</span>';
    else hint.innerHTML = '<span style="color:var(--danger);">❌ 密码不一致</span>';
});
</script>
{% endblock %}
