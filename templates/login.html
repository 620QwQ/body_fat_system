{% extends "base.html" %}
{% block content %}
<div style="max-width:420px; margin:40px auto;">
    <div class="card" style="padding:36px;">
        <div style="text-align:center; margin-bottom:30px;">
            <div style="font-size:3em; margin-bottom:10px;">👋</div>
            <h2 style="font-weight:700; margin-bottom:6px;">欢迎回来</h2>
            <p style="color:var(--text-muted); font-size:0.9em;">继续你的健康之旅</p>
        </div>
        {% if success %}<div class="alert alert-success">✅ {{ success }}</div>{% endif %}
        {% if error %}<div class="alert alert-error">⚠️ {{ error }}</div>{% endif %}
        <form method="post">
            <div class="form-group"><label>📱 手机号</label><input type="tel" name="phone" required placeholder="请输入注册手机号"></div>
            <div class="form-group"><label>🔒 密码</label><input type="password" name="password" required placeholder="请输入密码"></div>
            <button type="submit" class="btn btn-primary btn-block">登 录</button>
        </form>
        <p style="text-align:center; margin-top:20px; font-size:0.9em;">
            <a href="/register" style="color:var(--primary); font-weight:600;">注册新账号</a>
            <span style="color:var(--border); margin:0 8px;">|</span>
            <a href="/forgot_password" style="color:var(--text-muted);">忘记密码</a>
        </p>
    </div>
</div>
{% endblock %}
