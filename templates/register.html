{% extends "base.html" %}
{% block content %}
<div style="max-width:460px; margin:40px auto;">
    <div class="card" style="padding:36px;">
        <div style="text-align:center; margin-bottom:30px;">
            <div style="font-size:3em; margin-bottom:10px;">🎉</div>
            <h2 style="font-weight:700; margin-bottom:6px;">创建账号</h2>
            <p style="color:var(--text-muted); font-size:0.9em;">科学管理，遇见更好的自己</p>
        </div>
        {% if error %}<div class="alert alert-error">⚠️ {{ error }}</div>{% endif %}
        <form method="post" id="registerForm" autocomplete="off">
            <div class="form-group">
                <label>📱 手机号（用于登录）</label>
                <input type="tel" name="phone" required placeholder="请输入11位手机号" maxlength="11">
            </div>
            <div class="form-group">
                <label>✏️ 昵称</label>
                <input type="text" name="nickname" required placeholder="给自己取个名字吧">
                <div class="form-hint">昵称可以与他人重复</div>
            </div>
            <div class="form-group">
                <label>📛 真实姓名</label>
                <input type="text" name="real_name" required placeholder="用于实名认证和找回密码">
            </div>
            <div class="form-group">
                <label>🔒 密码</label>
                <input type="password" name="password" id="pwd" required placeholder="英文+数字，6位以上">
                <div class="form-hint">密码需包含英文和数字</div>
            </div>
            <div class="form-group">
                <label>🔒 确认密码</label>
                <input type="password" name="password2" id="pwd2" required placeholder="请再次输入密码">
                <div class="form-hint" id="pwdHint"></div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">注 册</button>
        </form>
        <p style="text-align:center; margin-top:20px; font-size:0.9em;">
            已有账号？<a href="/login" style="color:var(--primary); font-weight:600;">登录</a>
            <span style="color:var(--border); margin:0 8px;">|</span>
            <a href="/forgot_password" style="color:var(--text-muted);">忘记密码</a>
        </p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('pwd2').addEventListener('input', function() {
    var pwd = document.getElementById('pwd').value;
    var pwd2 = this.value;
    var hint = document.getElementById('pwdHint');
    if (pwd2.length === 0) { hint.textContent = ''; }
    else if (pwd === pwd2) { hint.innerHTML = '<span style="color:var(--success);">✅ 密码一致</span>'; }
    else { hint.innerHTML = '<span style="color:var(--danger);">❌ 密码不一致</span>'; }
});
document.getElementById('registerForm').addEventListener('submit', function(e) {
    var pwd = document.getElementById('pwd').value;
    var hasLetter = /[a-zA-Z]/.test(pwd);
    var hasDigit = /[0-9]/.test(pwd);
    var phone = document.querySelector('input[name="phone"]').value;
    if (phone.length !== 11 || !/^\d+$/.test(phone)) {
        e.preventDefault(); alert('请输入正确的11位手机号'); return;
    }
    if (!hasLetter || !hasDigit) {
        e.preventDefault(); alert('密码必须包含英文和数字！'); return;
    }
    if (pwd.length < 6) {
        e.preventDefault(); alert('密码至少6位！'); return;
    }
    if (pwd !== document.getElementById('pwd2').value) {
        e.preventDefault(); alert('两次密码不一致！'); return;
    }
});
</script>
{% endblock %}
